<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Field guide — pdp8.se</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 60rem; margin: 3rem auto;
           padding: 0 1rem; line-height: 1.5; }
    h1 { margin-bottom: 0.2rem; }
    .lede { margin-top: 0; color: #666; }

    .workflow { display: flex; align-items: center; gap: 1.25rem; margin-top: 2rem;
                flex-wrap: wrap; }
    .box { flex: 0 0 11rem; width: 11rem; aspect-ratio: 1 / 1; box-sizing: border-box;
           border: 1px solid #ccc; border-radius: 10px; padding: 1rem 1.25rem;
           text-decoration: none; color: inherit; display: flex; flex-direction: column;
           justify-content: center; transition: border-color 0.15s, background 0.15s; }
    .box:hover { border-color: #888; background: rgba(0, 0, 0, 0.03); }
    .box h2 { margin: 0 0 0.4rem; font-size: 1.2rem; }
    .box p { margin: 0; color: #666; font-size: 0.95rem; }
    .arrow { display: flex; align-items: center; justify-content: center;
             font-size: 2.2rem; font-weight: 900; color: #444; flex: 0 0 auto;
             padding: 0 0.25rem; }
    @media (max-width: 36rem) { .arrow { transform: rotate(90deg); } }

    @media (prefers-color-scheme: dark) {
      .lede, .box p { color: #aaa; }
      .box { border-color: #444; }
      .box:hover { border-color: #888; background: rgba(255, 255, 255, 0.04); }
      .arrow { color: #ccc; }
    }
  </style>
</head>
<body>
  <h1>Field guide</h1>
  <p class="lede">Identify PDP-11 / VAX Q-bus and UNIBUS boards from a stack of unknowns.</p>

  <div class="workflow">
    <a class="box" href="ocr.html">
      <h2>Scan</h2>
      <p>Read module numbers from a photo.</p>
    </a>
    <div class="arrow" aria-hidden="true">&rarr;</div>
    <a class="box" href="guide.html">
      <h2>Identify</h2>
      <p>Name and group modules into options.</p>
    </a>
  </div>
</body>
</html>
