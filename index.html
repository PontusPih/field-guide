<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Field guide — pdp8.se</title>
  <style>
    :root { color-scheme: light dark; }
    body { font-family: system-ui, sans-serif; max-width: 92rem; margin: 2rem auto;
           padding: 0 1rem; line-height: 1.5; }
    h1 { margin-bottom: 0.2rem; }
    .lede { margin-top: 0; color: #666; }

    .layout { display: grid; gap: 1.5rem;
              grid-template-columns: minmax(13rem, 16rem) minmax(0, 1fr) 36rem;
              align-items: start; }
    @media (max-width: 60rem) { .layout { grid-template-columns: 1fr; } }
    .panel-h { font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.04em;
               color: #888; margin: 0 0 0.5rem; }

    textarea { width: 100%; min-height: 12rem; font-family: ui-monospace, monospace;
               font-size: 0.95rem; padding: 0.5rem; box-sizing: border-box; }
    button { font-size: 1rem; padding: 0.5rem 1rem; margin-top: 0.5rem; cursor: pointer; }
    #status { color: #666; font-size: 0.9rem; }

    .export-panel label { display: block; font-size: 0.9rem; margin: 0.25rem 0 0.5rem; }
    .export-panel .hint { color: #888; margin-top: 0.5rem; }

    .option { border: 1px solid #ccc; border-radius: 8px; padding: 0.75rem 1rem;
              margin: 0 0 1rem; }
    .option > h2 { margin: 0 0 0.25rem; font-size: 1.1rem; }
    .badge { display: inline-block; font-size: 0.75rem; font-weight: 600;
             padding: 0.1rem 0.5rem; border-radius: 999px; margin-left: 0.5rem;
             vertical-align: middle; }
    .badge.complete { background: #1b7f37; color: #fff; }
    .badge.partial  { background: #b06a00; color: #fff; }
    .badge.bus      { background: #eee; color: #333; }
    .mod { margin: 0.35rem 0; }
    .mod .num { font-family: ui-monospace, monospace; font-weight: 600; }
    .mod .desc { color: #444; }
    .mod .revs { font-size: 0.8rem; color: #888; font-family: ui-monospace, monospace; }
    .mod.missing { opacity: 0.6; }
    .mod.missing .num::after { content: " — missing"; font-weight: 400; font-style: italic; }
    .unknown { color: #b00; }
    .hints { background: #f5f5f5; border-radius: 8px; padding: 0.5rem 1rem; margin: 0 0 1rem; }
    .hints h2 { font-size: 1rem; margin: 0.25rem 0; }

    #export-preview { font-family: ui-monospace, monospace; font-size: 0.8rem;
                      white-space: pre; overflow: auto; background: #f5f5f5;
                      border: 1px solid #ccc; border-radius: 8px; padding: 0.75rem 1rem;
                      max-height: 32rem; margin: 0.75rem 0 0; }
    @media (prefers-color-scheme: dark) {
      .lede, #status, .mod .desc { color: #aaa; }
      .option { border-color: #444; }
      .badge.bus { background: #333; color: #ddd; }
      .hints { background: #1e1e1e; }
      #export-preview { background: #1e1e1e; border-color: #444; }
    }
  </style>
</head>
<body>
  <h1>Field guide</h1>
  <p class="lede">Identify PDP-11 / VAX Q-bus and UNIBUS boards from their module numbers.</p>

  <div class="layout">
    <section class="input-panel">
      <p class="panel-h">Modules</p>
      <p>Paste module numbers, one per line (revision suffixes like <code>-YA</code> are OK):</p>
      <textarea id="input" spellcheck="false"></textarea>
      <div><button id="lookup">Look up</button></div>
      <p id="status">Loading field guide…</p>
    </section>

    <section class="results-panel">
      <p class="panel-h">Identified</p>
      <div id="results"></div>
    </section>

    <aside class="export-panel">
      <p class="panel-h">Export</p>
      <label><input type="checkbox" id="include-missing"> Include missing boards</label>
      <div><button id="download">Download</button></div>
      <p class="hint"><small>Downloads a plain-text list of your modules, grouped by option.</small></p>
      <pre id="export-preview"></pre>
    </aside>
  </div>

  <script type="module" src="app.js"></script>
</body>
</html>
